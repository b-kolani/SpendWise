$kind: http-request
name: Create Invalid Transaction
method: POST
url: '{{baseUrl}}/api/transactions/'
headers:
  - key: Authorization
    value: 'Bearer {{accessToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "title": "Bad Transaction",
      "amount": "-10.00",
      "date": "2026-07-05",
      "type": "EXPENSE",
      "category": {{categoryId}}
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 400 for negative amount", function () {
        pm.response.to.have.status(400);
      });
      pm.test("Error message mentions amount", function () {
        const json = pm.response.json();
        pm.expect(JSON.stringify(json)).to.include("amount");
      });
