$kind: http-request
name: Filter by Type
method: GET
url: "{{baseUrl}}/api/transactions/?type=income"
headers:
  Authorization: Bearer {{accessToken}}
queryParams:
  type: income
scripts:
  - type: afterResponse
    code: |
      pm.test("Status is 200", function () {
        pm.response.to.have.status(200);
      });

      pm.test("All returned transactions are expense or income type", function () {
        const json = pm.response.json();
        console.log(json);
        json.forEach(function(tx) {
          if (tx.type === "income") {
              pm.expect(tx.type).to.eq("income");
          } else {
              pm.expect(tx.type).to.eq("expense");
          }
        });
      });
    language: text/javascript
