$kind: http-request
name: Create Transaction
method: POST
url: "{{baseUrl}}/api/transactions/"
headers:
  Authorization: Bearer {{accessToken}}
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "title": "Grocery Shopping 23",
      "amount": 75.50,
      "date": "2026-07-10",
      "description": "Weekly groceries",
      "type": "income",
      "category": {{categoryId}}
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 201", function () {
        pm.response.to.have.status(201);
      });
      pm.test("Created transaction has correct fields", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property("id");
        pm.expect(json.title).to.eql("Grocery Shopping");
        pm.expect(json.type).to.eql("EXPENSE");
        pm.expect(parseFloat(json.amount)).to.eql(45.50);
        pm.collectionVariables.set("transactionId", json.id);
      });
      pm.test("User field is read-only and auto-assigned", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property("user");
      });
    language: text/javascript
