$kind: http-request
name: Create Income Transaction
method: POST
url: "{{baseUrl}}/api/transactions/"
headers:
  Authorization: Bearer {{accessToken}}
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "title": "Monthly Income 1",
      "amount": 750.00,
      "description": "July salary",
      "type": "income",
      "category": {{categoryId}}
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 201", function () {
        pm.response.to.have.status(201);
      });
      pm.test("Income or Expense transaction created successfully", function () {
        const json = pm.response.json();
        if (json.type === "income") {
          pm.expect(json.type).to.eql("income");
        } else {
          pm.expect(json.type).to.eql("expense");
        }
        pm.expect(parseFloat(json.amount)).to.eql(parseInt(json.amount));
      });
    language: text/javascript
