$kind: http-request
name: List Transactions
method: GET
url: "{{baseUrl}}/api/transactions/"
headers:
  Authorization: Bearer {{accessToken}}
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 200", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Response is an array", function () {
        const json = pm.response.json();
        pm.expect(json).to.be.an("object");
      });
      pm.test("Each transaction has required fields", function () {
        const json = pm.response.json();
        if (json.length > 0) {
          json.forEach(function(tx) {
            pm.expect(tx).to.have.property("id");
            pm.expect(tx).to.have.property("title");
            pm.expect(tx).to.have.property("amount");
            pm.expect(tx).to.have.property("date");
            pm.expect(tx).to.have.property("type");
            pm.expect(tx).to.have.property("category");
          });
        }
      });
      pm.test("Only authenticated user's transactions are returned", function () {
        pm.response.to.have.status(200);
      });
    language: text/javascript
