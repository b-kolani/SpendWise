$kind: http-request
name: Delete Transaction
method: DELETE
url: '{{baseUrl}}/api/transactions/{{transactionId}}/'
headers:
  - key: Authorization
    value: 'Bearer {{accessToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 204", function () {
        pm.response.to.have.status(204);
      });
