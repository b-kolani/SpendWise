$kind: http-request
name: Partial Update Transaction
method: PATCH
url: '{{baseUrl}}/api/transactions/{{transactionId}}/'
headers:
  - key: Authorization
    value: 'Bearer {{accessToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "description": "Updated description only"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Only description was updated", function () {
        const json = pm.response.json();
        pm.expect(json.description).to.eql("Updated description only");
      });
