$kind: http-request
name: Get Transaction
method: GET
url: "{{baseUrl}}/api/transactions/{{transactionId}}/"
headers:
  Authorization: Bearer {{accessToken}}
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 200", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Transaction has all required fields", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property("id");
        pm.expect(json).to.have.property("title");
        pm.expect(json).to.have.property("amount");
        pm.expect(json).to.have.property("date");
        pm.expect(json).to.have.property("type");
        pm.expect(json).to.have.property("category");
      });
    language: text/javascript
