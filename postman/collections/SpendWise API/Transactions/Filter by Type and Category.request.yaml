$kind: http-request
name: Filter by Type and Category
url: "{{baseUrl}}/api/transactions/?type=income&category={{categoryId}}"
method: GET
headers:
  Authorization: Bearer {{accessToken}}
queryParams:
  type: income
  category: "{{categoryId}}"
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 200", function () {
        pm.response.to.have.status(200);
      });

      pm.test("All returned transactions are expense or income type and belong to the category", function () {
        const json = pm.response.json();
        json.results.forEach(function(tx) {
          pm.expect(tx.category);
          pm.expect(tx.type).to.be.oneOf(["expense", "income"]);
        });
      });
    language: text/javascript
order: 4063995789049855
