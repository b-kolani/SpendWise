$kind: collection
name: SpendWise API
variables:
  - key: baseUrl
    value: http://localhost:8000
    secret: false
  - key: username
    secret: true
  - key: password
    secret: true
  - key: accessToken
    secret: true
  - key: refreshToken
    secret: true
  - key: categoryId
    value: ""
    secret: false
  - key: transactionId
    value: ""
    secret: false
