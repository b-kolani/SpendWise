$kind: http-request
name: Delete Category
method: DELETE
url: '{{baseUrl}}/api/categories/{{categoryId}}/'
order: 6000
headers:
  - key: Authorization
    value: 'Bearer {{accessToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 204", function () {
        pm.response.to.have.status(204);
      });
      pm.test("Category is no longer accessible", function () {
        // Informational: follow up with a GET to verify 404
      });
