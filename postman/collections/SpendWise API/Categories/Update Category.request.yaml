$kind: http-request
name: Update Category
method: PUT
url: '{{baseUrl}}/api/categories/{{categoryId}}/'
order: 4000
headers:
  - key: Authorization
    value: 'Bearer {{accessToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Food & Dining Updated",
      "color": "#C70039",
      "icon": "fork-knife"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Category was updated", function () {
        const json = pm.response.json();
        pm.expect(json.name).to.eql("Food & Dining Updated");
        pm.expect(json.color).to.eql("#C70039");
      });
