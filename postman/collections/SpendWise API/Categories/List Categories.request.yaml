$kind: http-request
name: List Categories
method: GET
url: '{{baseUrl}}/api/categories/'
order: 1000
headers:
  - key: Authorization
    value: 'Bearer {{accessToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Response is an array", function () {
        const json = pm.response.json();
        pm.expect(json).to.be.an("array");
      });
      pm.test("Each category has required fields", function () {
        const json = pm.response.json();
        if (json.length > 0) {
          json.forEach(function(cat) {
            pm.expect(cat).to.have.property("id");
            pm.expect(cat).to.have.property("name");
            pm.expect(cat).to.have.property("color");
          });
        }
      });
      pm.test("Unauthenticated request is rejected", function () {
        // This test is informational — run without token to verify 401
      });
