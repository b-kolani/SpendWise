$kind: http-request
name: Create Category
method: POST
url: "{{baseUrl}}/api/categories/"
order: 2000
headers:
  Authorization: Bearer {{accessToken}}
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "Nourriture",
      "color": "#00FF00",
      "icon": "shopping-cart",
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 201", function () {
        pm.response.to.have.status(201);
      });
      pm.test("Created category has correct fields", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property("id");
        pm.expect(json.name).to.eql("Food & Dining");
        pm.expect(json.color).to.eql("#FF5733");
        pm.collectionVariables.set("categoryId", json.id);
      });
      pm.test("Category belongs to authenticated user", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property("id");
      });
    language: text/javascript
