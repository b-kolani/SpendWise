$kind: http-request
name: Refresh Token
method: POST
url: "{{baseUrl}}/api/token/refresh/"
order: 2000
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "refresh": "{{refreshToken}}"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 200", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Response has new access token", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property("access");
        pm.expect(json.access).to.be.a("string").and.not.empty;
        pm.collectionVariables.set("accessToken", json.access);
      });
    language: text/javascript
